name: Feature request
description: Suggest an extractor, report, CI, or workflow improvement.
title: "Feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is hard or missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should the tool do?
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example input or command
      render: shell
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Extraction
        - Reporting
        - CLI
        - GitHub Action
        - Documentation
        - Other
    validations:
      required: true
