name: Tailwind Pattern Audit
description: Find repeated Tailwind class patterns in JavaScript, TypeScript, HTML, Astro, Vue, and Svelte projects.
author: Naum

branding:
  icon: search
  color: blue

inputs:
  cwd:
    description: Project directory to scan.
    required: false
    default: "."
  include:
    description: Space-separated glob patterns to include.
    required: false
  exclude:
    description: Space-separated glob patterns to exclude.
    required: false
  min-occurrences:
    description: Minimum duplicate occurrences to report.
    required: false
  min-classes:
    description: Minimum class count required for a class string.
    required: false
  priority:
    description: "Space-separated recommendation priorities to include: high, medium, low."
    required: false
  kind:
    description: "Space-separated recommendation kinds to include: component, utility, cva."
    required: false
  hide-layout-only:
    description: Hide groups made only of layout primitives.
    required: false
  similar:
    description: Detect near-duplicate class sets.
    required: false
  min-similarity:
    description: Minimum Jaccard similarity for near-duplicate groups.
    required: false
  max-similar-groups:
    description: Maximum near-duplicate groups to report.
    required: false
  baseline:
    description: Previous JSON report whose duplicate groups should be ignored.
    required: false
  ignore-files:
    description: Newline-separated file globs to omit from report evidence.
    required: false
  ignore-patterns:
    description: Newline-separated exact class patterns to omit from duplicate and similarity reports.
    required: false
  format:
    description: "Output format: terminal, json, markdown, html, pr, github, or sarif."
    required: false
    default: "terminal"
  output:
    description: Optional report output path.
    required: false
  comment:
    description: Post or update a pull request comment with the report.
    required: false
    default: "false"
  annotations:
    description: Emit GitHub workflow annotations for duplicate groups and diagnostics.
    required: false
    default: "false"
  annotation-limit:
    description: Maximum duplicate group annotations to emit.
    required: false
    default: "50"
  fail-on:
    description: "Space-separated failure conditions: duplicates, diagnostics, warnings, errors."
    required: false
  max-groups:
    description: Fail when duplicate group count exceeds this number.
    required: false
  max-occurrences:
    description: Fail when reported duplicate occurrence count exceeds this number.
    required: false
  node-version:
    description: Node.js version used to run the npm package.
    required: false
    default: "24"
  version:
    description: npm package version or dist tag to run.
    required: false
    default: "latest"

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Run audit
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        set -f

        args=(--cwd "${{ inputs.cwd }}" --format "${{ inputs.format }}")
        report_path="${{ inputs.output }}"

        append_multiline_args() {
          local option_name="$1"
          local values="$2"

          while IFS= read -r value; do
            if [ -n "$value" ]; then
              args+=("$option_name" "$value")
            fi
          done <<< "$values"
        }

        if [ -n "$report_path" ] && [[ "$report_path" != /* ]]; then
          report_path="${{ inputs.cwd }}/$report_path"
        fi

        if [ -n "${{ inputs.include }}" ]; then
          args+=(--include ${{ inputs.include }})
        fi

        if [ -n "${{ inputs.exclude }}" ]; then
          args+=(--exclude ${{ inputs.exclude }})
        fi

        if [ -n "${{ inputs.min-occurrences }}" ]; then
          args+=(--min-occurrences "${{ inputs.min-occurrences }}")
        fi

        if [ -n "${{ inputs.min-classes }}" ]; then
          args+=(--min-classes "${{ inputs.min-classes }}")
        fi

        if [ -n "${{ inputs.priority }}" ]; then
          args+=(--priority ${{ inputs.priority }})
        fi

        if [ -n "${{ inputs.kind }}" ]; then
          args+=(--kind ${{ inputs.kind }})
        fi

        if [ "${{ inputs.hide-layout-only }}" = "true" ]; then
          args+=(--hide-layout-only)
        fi

        if [ "${{ inputs.similar }}" = "true" ]; then
          args+=(--similar)
        fi

        if [ -n "${{ inputs.min-similarity }}" ]; then
          args+=(--min-similarity "${{ inputs.min-similarity }}")
        fi

        if [ -n "${{ inputs.max-similar-groups }}" ]; then
          args+=(--max-similar-groups "${{ inputs.max-similar-groups }}")
        fi

        if [ -n "${{ inputs.baseline }}" ]; then
          args+=(--baseline "${{ inputs.baseline }}")
        fi

        append_multiline_args "--ignore-file" "${{ inputs.ignore-files }}"
        append_multiline_args "--ignore-pattern" "${{ inputs.ignore-patterns }}"

        annotation_args=("${args[@]}")
        annotation_args[3]="github"

        if [ -n "${{ inputs.annotation-limit }}" ]; then
          annotation_args+=(--annotation-limit "${{ inputs.annotation-limit }}")

          if [ "${{ inputs.format }}" = "github" ]; then
            args+=(--annotation-limit "${{ inputs.annotation-limit }}")
          fi
        fi

        if [ -n "${{ inputs.output }}" ]; then
          args+=(--output "${{ inputs.output }}")
        fi

        if [ "${{ inputs.comment }}" = "true" ] && [ -z "$report_path" ]; then
          report_path="$(mktemp)"
          args+=(--output "$report_path" --quiet)
        fi

        if [ -n "${{ inputs.fail-on }}" ]; then
          args+=(--fail-on ${{ inputs.fail-on }})
        fi

        if [ -n "${{ inputs.max-groups }}" ]; then
          args+=(--max-groups "${{ inputs.max-groups }}")
        fi

        if [ -n "${{ inputs.max-occurrences }}" ]; then
          args+=(--max-occurrences "${{ inputs.max-occurrences }}")
        fi

        set +e
        npx --yes "tailwind-pattern-audit@${{ inputs.version }}" "${args[@]}"
        status=$?
        set -e

        if [ "${{ inputs.comment }}" = "true" ]; then
          if [ "${{ github.event_name }}" != "pull_request" ] && [ "${{ github.event_name }}" != "pull_request_target" ]; then
            echo "::warning::comment input is true, but this workflow is not running on a pull request event."
          elif [ -z "$report_path" ] || [ ! -f "$report_path" ]; then
            echo "::warning::comment input is true, but no report output was available to post."
          else
            marker="<!-- tailwind-pattern-audit -->"
            body_file="$(mktemp)"
            {
              printf '%s\n' "$marker"
              cat "$report_path"
            } > "$body_file"

            comments_endpoint="repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments"
            existing_comment_id="$(
              gh api "$comments_endpoint" --jq ".[] | select(.user.type == \"Bot\" and (.body | contains(\"$marker\"))) | .id" | head -n 1
            )"

            if [ -n "$existing_comment_id" ]; then
              gh api -X PATCH "repos/${{ github.repository }}/issues/comments/${existing_comment_id}" -f body="$(cat "$body_file")" >/dev/null
            else
              gh api -X POST "$comments_endpoint" -f body="$(cat "$body_file")" >/dev/null
            fi
          fi
        fi

        if [ "${{ inputs.annotations }}" = "true" ]; then
          set +e
          npx --yes "tailwind-pattern-audit@${{ inputs.version }}" "${annotation_args[@]}"
          annotation_status=$?
          set -e

          if [ "$annotation_status" -ne 0 ]; then
            echo "::warning::annotations input is true, but annotation generation failed."
          fi
        fi

        exit "$status"
