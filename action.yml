name: Tailwind Pattern Audit
description: Find repeated Tailwind class patterns in JavaScript, TypeScript, HTML, and Astro projects.
author: Naum

branding:
  icon: search
  color: blue

inputs:
  cwd:
    description: Project directory to scan.
    required: false
    default: "."
  include:
    description: Space-separated glob patterns to include.
    required: false
  exclude:
    description: Space-separated glob patterns to exclude.
    required: false
  min-occurrences:
    description: Minimum duplicate occurrences to report.
    required: false
  min-classes:
    description: Minimum class count required for a class string.
    required: false
  priority:
    description: "Space-separated recommendation priorities to include: high, medium, low."
    required: false
  kind:
    description: "Space-separated recommendation kinds to include: component, utility, cva."
    required: false
  hide-layout-only:
    description: Hide groups made only of layout primitives.
    required: false
  similar:
    description: Detect near-duplicate class sets.
    required: false
  min-similarity:
    description: Minimum Jaccard similarity for near-duplicate groups.
    required: false
  max-similar-groups:
    description: Maximum near-duplicate groups to report.
    required: false
  format:
    description: "Output format: terminal, json, markdown, or pr."
    required: false
    default: "terminal"
  output:
    description: Optional report output path.
    required: false
  fail-on:
    description: "Space-separated failure conditions: duplicates, diagnostics, warnings, errors."
    required: false
  max-groups:
    description: Fail when duplicate group count exceeds this number.
    required: false
  max-occurrences:
    description: Fail when reported duplicate occurrence count exceeds this number.
    required: false
  node-version:
    description: Node.js version used to run the npm package.
    required: false
    default: "24"
  version:
    description: npm package version or dist tag to run.
    required: false
    default: "latest"

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Run audit
      shell: bash
      run: |
        set -euo pipefail
        set -f

        args=(--cwd "${{ inputs.cwd }}" --format "${{ inputs.format }}")

        if [ -n "${{ inputs.include }}" ]; then
          args+=(--include ${{ inputs.include }})
        fi

        if [ -n "${{ inputs.exclude }}" ]; then
          args+=(--exclude ${{ inputs.exclude }})
        fi

        if [ -n "${{ inputs.min-occurrences }}" ]; then
          args+=(--min-occurrences "${{ inputs.min-occurrences }}")
        fi

        if [ -n "${{ inputs.min-classes }}" ]; then
          args+=(--min-classes "${{ inputs.min-classes }}")
        fi

        if [ -n "${{ inputs.priority }}" ]; then
          args+=(--priority ${{ inputs.priority }})
        fi

        if [ -n "${{ inputs.kind }}" ]; then
          args+=(--kind ${{ inputs.kind }})
        fi

        if [ "${{ inputs.hide-layout-only }}" = "true" ]; then
          args+=(--hide-layout-only)
        fi

        if [ "${{ inputs.similar }}" = "true" ]; then
          args+=(--similar)
        fi

        if [ -n "${{ inputs.min-similarity }}" ]; then
          args+=(--min-similarity "${{ inputs.min-similarity }}")
        fi

        if [ -n "${{ inputs.max-similar-groups }}" ]; then
          args+=(--max-similar-groups "${{ inputs.max-similar-groups }}")
        fi

        if [ -n "${{ inputs.output }}" ]; then
          args+=(--output "${{ inputs.output }}")
        fi

        if [ -n "${{ inputs.fail-on }}" ]; then
          args+=(--fail-on ${{ inputs.fail-on }})
        fi

        if [ -n "${{ inputs.max-groups }}" ]; then
          args+=(--max-groups "${{ inputs.max-groups }}")
        fi

        if [ -n "${{ inputs.max-occurrences }}" ]; then
          args+=(--max-occurrences "${{ inputs.max-occurrences }}")
        fi

        npx --yes "tailwind-pattern-audit@${{ inputs.version }}" "${args[@]}"
